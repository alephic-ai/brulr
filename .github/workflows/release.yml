name: Release

on:
  push:
    branches: [main]
    paths: [Cargo.toml]

permissions:
  contents: write

jobs:
  check:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.check.outputs.tag }}
      needed: ${{ steps.check.outputs.needed }}
      crates_io_needed: ${{ steps.check.outputs.crates_io_needed }}
    steps:
      - uses: actions/checkout@v7
      - name: Check if version is unreleased
        id: check
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          version=$(cargo pkgid | cut -d'#' -f2)
          tag="v$version"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"

          if gh release view "$tag" >/dev/null 2>&1; then
            echo "$tag already released, skipping GitHub release"
            echo "needed=false" >> "$GITHUB_OUTPUT"
          else
            echo "needed=true" >> "$GITHUB_OUTPUT"
          fi

          if cargo info "brulr@$version" >/dev/null 2>&1; then
            echo "brulr $version already on crates.io, skipping"
            echo "crates_io_needed=false" >> "$GITHUB_OUTPUT"
          else
            echo "crates_io_needed=true" >> "$GITHUB_OUTPUT"
          fi

  build:
    needs: check
    if: needs.check.outputs.needed == 'true'
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
          - os: macos-latest
            target: aarch64-apple-darwin
          - os: macos-latest
            target: x86_64-apple-darwin
          - os: windows-latest
            target: x86_64-pc-windows-msvc
          - os: windows-latest
            target: aarch64-pc-windows-msvc
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7
      - name: Build and package
        shell: bash
        run: |
          rustup target add ${{ matrix.target }}
          cargo build --release --target ${{ matrix.target }}
          mkdir dist
          name="brulr-${{ needs.check.outputs.tag }}-${{ matrix.target }}"
          bin=target/${{ matrix.target }}/release/brulr
          if [ -f "$bin.exe" ]; then
            7z a "dist/$name.zip" "./$bin.exe"
          else
            tar -czf "dist/$name.tar.gz" -C "$(dirname "$bin")" brulr
          fi
      - uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.target }}
          path: dist/*

  release:
    needs: [check, build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/download-artifact@v8
        with:
          path: dist
          merge-multiple: true
      - name: Create release with assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create '${{ needs.check.outputs.tag }}' --generate-notes dist/*

  # Publishes via crates.io Trusted Publishing (OIDC) — no long-lived token.
  crates-io:
    needs: check
    if: needs.check.outputs.crates_io_needed == 'true'
    runs-on: ubuntu-latest
    permissions:
      id-token: write # OIDC exchange with crates.io
      contents: read
    steps:
      - uses: actions/checkout@v7
      - uses: rust-lang/crates-io-auth-action@v1
        id: auth
      - name: Publish to crates.io
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}
        run: cargo publish --locked
