name: Release

on:
  push:
    branches: [master]
    paths: [Cargo.toml]

permissions:
  contents: write

jobs:
  check:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.check.outputs.tag }}
      needed: ${{ steps.check.outputs.needed }}
    steps:
      - uses: actions/checkout@v7
      - name: Check if version is unreleased
        id: check
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          version=$(cargo pkgid | cut -d'#' -f2)
          tag="v$version"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          if gh release view "$tag" >/dev/null 2>&1; then
            echo "$tag already released, skipping"
            echo "needed=false" >> "$GITHUB_OUTPUT"
          else
            echo "needed=true" >> "$GITHUB_OUTPUT"
          fi

  build:
    needs: check
    if: needs.check.outputs.needed == 'true'
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: macos-latest
            target: aarch64-apple-darwin
          - os: windows-latest
            target: x86_64-pc-windows-msvc
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7
      - name: Build and package
        shell: bash
        run: |
          cargo build --release
          mkdir dist
          name="brulr-${{ needs.check.outputs.tag }}-${{ matrix.target }}"
          if [ -f target/release/brulr.exe ]; then
            7z a "dist/$name.zip" ./target/release/brulr.exe
          else
            tar -czf "dist/$name.tar.gz" -C target/release brulr
          fi
      - uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.target }}
          path: dist/*

  release:
    needs: [check, build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/download-artifact@v8
        with:
          path: dist
          merge-multiple: true
      - name: Create release with assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create '${{ needs.check.outputs.tag }}' --generate-notes dist/*
