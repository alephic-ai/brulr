name: Markdown

on: [push, pull_request]

# Least privilege for checkout + rumdl (code scanning: missing-workflow-permissions).
permissions:
  contents: read

jobs:
  rumdl:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: rvben/rumdl@v0
        with:
          report-type: annotations
